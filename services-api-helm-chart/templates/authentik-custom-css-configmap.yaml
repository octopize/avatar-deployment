{{- if .Values.authentik.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-custom-css
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "avatar.labels" . | nindent 4 }}
data:
  {{- /* Strip trailing spaces before nindent: blank lines in the CSS become lines of pure spaces after indentation, which yamllint rejects as trailing-spaces errors. */ -}}
  {{- (.Files.Glob "static/css/*.css").AsConfig | regexReplaceAll `(?m) +$` "" | nindent 2 }}
{{- end }}
