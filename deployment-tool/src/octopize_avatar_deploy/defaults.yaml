version: 1.0.0
images:
  api: 2.71.0
  web: 0.60.0
  pdfgenerator: 0.2.3
  seaweedfs: '4.22'
  authentik: 2026.2.2
email:
  smtp:
    host: ''
    port: '587'
    use_tls: 'true'
    start_tls: 'false'
    verify: 'true'
    sender_email: noreply@octopize.io
telemetry:
  enabled: true
  endpoint_url: https://s3.fr-par.scw.cloud
  region: fr-par
application:
  use_console_logging: 'false'
  log_level: INFO
  sentry_enabled: 'true'
nginx:
  tls_enabled: true
  http_port: '8080'
  ssl_certificate_path: ./tls/server.fullchain.crt
  ssl_certificate_key_path: ./tls/private/server.decrypted.key
presets:
  default:
    description: Production-ready configuration with telemetry and monitoring
    application:
      use_console_logging: 'false'
      sentry_enabled: 'true'
    telemetry:
      enabled: true
  dev-mode:
    description: Development mode with console logging, no external services
    application:
      use_console_logging: 'true'
      sentry_enabled: 'false'
    telemetry:
      enabled: false
  airgapped:
    description: Air-gapped deployment without external monitoring or telemetry
    application:
      use_console_logging: 'false'
      sentry_enabled: 'false'
    telemetry:
      enabled: false
local_source:
  web_source_path: ~/Documents/dev/avatar/services/web
  npmrc_path: ~/.npmrc
  api_source_path: ~/Documents/dev/avatar/services/api
