# Docker Compose Override for Development Mode
#
# This file is automatically generated when using --mode dev
# It configures bind mounts and local build contexts for development.
#
# Usage:
#   docker compose up -d
#   (Docker Compose automatically merges docker-compose.yml and compose.override.yaml)

services:
  web:
    # Build from local source directory instead of pulling image
    build:
      context: /tmp/TEMP_DIR/test-avatar-website
      dockerfile: Dockerfile.dev
      secrets:
        - npmrc

    # Bind mount source code for live reloading
    volumes:
      - /tmp/TEMP_DIR/test-avatar-website:/app

  api:
    build: &build
      context: /tmp/TEMP_DIR/test-avatar-repo/services/api
      additional_contexts:
        avatar: /tmp/TEMP_DIR/test-avatar-repo/avatar
        core: /tmp/TEMP_DIR/test-avatar-repo/core
        dp: /tmp/TEMP_DIR/test-avatar-repo/dp

  init-db:
    build:
      <<: *build

  dask-scheduler:
    build:
      <<: *build
    ports:
      - "8786:8786"
      - "8787:8787"

  dask-worker:
    build:
      <<: *build

# Secrets for development build
secrets:
  npmrc:
    file: /tmp/TEMP_DIR/test-.npmrc
