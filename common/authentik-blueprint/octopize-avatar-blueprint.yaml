# ============================================================
# BRAND
# ============================================================
  - attrs:
      branding_custom_css: |-
        /*
         * Octopize Brand CSS for authentik SSO
         * Source of truth: common/authentik-blueprint/octopize-avatar-blueprint.yaml
         * (branding_custom_css field)
         *
         * ARCHITECTURE
         * ─────────────────────────────────────────────────────────────────────────────
         * authentik renders each login stage inside nested Web Components, each with
         * its own shadow root. This CSS is loaded in two ways:
         *   1. As a light DOM <style> tag — element selectors, ::part(), and CSS
         *      custom properties set on shadow hosts all work here.
         *   2. As adopted stylesheets injected into every shadow root by authentik's
         *      JS — so regular selectors directly target shadow DOM elements (inputs,
         *      buttons, .pf-c-brand, footer).
         *
         * Known issues:
         *   - Issue #14958: Font families with quoted strings fail in YAML blueprints.
         *   - Issue #15149: No native file-path support in branding_custom_css.
         *   - Issue #19506: ak-locale-select is in shadow DOM; use ::part() to style.
         *   - Issue #19556: 2025.12 CSS regression — use CSS custom properties,
         *     not direct element selectors. Include both pf-c-* and pf-v5-c-* variants.
         *
         * Flow surface colours:
         *   - Light theme colour: #F6FAFE
         *   - Dark theme colour:  #1D1D1B
         *
         * Octopize brand colours:
         *   Primary teal: #3bd6b0
         *   Hover teal:   #30b898
         */

        /* ── CSS Custom Properties + inherited properties ───────────────────────────── */
        /*
         * Set on the shadow host (<ak-flow-executor>), these cascade into all nested
         * shadow roots via CSS inheritance / the custom-property inheritance mechanism.
         *
         * PatternFly's component CSS consumes the --pf-global--* vars for colours, so
         * overriding them here changes buttons, links, focus rings, etc. everywhere.
         *
         */
        ak-flow-executor {
          /* Octopize teal — #3bd6b0 */
          --pf-global--primary-color--100: #3bd6b0;  /* button bg */
          --pf-global--primary-color--200: #30b898;  /* button bg hover (darker) */
          --pf-global--primary-color--300: #269a80;  /* button bg active */
          --pf-global--link--Color:        #3bd6b0;
          --pf-global--link--Color--hover: #30b898;
          --pf-global--active-color--100:  #3bd6b0;  /* PF v4 focus ring */

          /* PF v5 variants (introduced in authentik 2025.12) */
          --pf-v5-global--focus-ring--Color:                #3bd6b0;
          --pf-c-form-control--focus--BorderBottomColor:    #3bd6b0;
          --pf-v5-c-form-control--focus--BorderBottomColor: #3bd6b0;

          /* Disable the right-panel decorative media at xl (>1200px) viewport widths */
          --pf-c-login--xl--BackgroundImage: none;
          background-position: center;
          background-repeat: no-repeat;
          background-size: cover;
        }

        :root {
          --octopize-authentik-background-light: #F6FAFE;
          --octopize-authentik-background-dark: #1D1D1B;
        }

        html[data-theme="light"] body,
        html[data-theme="light"] body::before,
        html[data-theme="light"] ak-flow-executor {
          --ak-global--background-image: none !important;
          background-image: none !important;
          background-color: var(--octopize-authentik-background-light) !important;
          --pf-c-login--BackgroundImage: none;
          --pf-c-login--xl--BackgroundImage: none;
          --pf-v5-c-login--BackgroundImage: none;
          --pf-v5-c-login--xl--BackgroundImage: none;
        }

        html[data-theme="dark"] body,
        html[data-theme="dark"] body::before,
        html[data-theme="dark"] ak-flow-executor {
          --ak-global--background-image: none !important;
          background-image: none !important;
          background-color: var(--octopize-authentik-background-dark) !important;
          --pf-c-login--BackgroundImage: none;
          --pf-c-login--xl--BackgroundImage: none;
          --pf-v5-c-login--BackgroundImage: none;
          --pf-v5-c-login--xl--BackgroundImage: none;
        }

        /* ── Locale selector ────────────────────────────────────────────────────────── */
        /*
         * ak-locale-select renders inside ak-flow-executor's shadow root and exposes:
         *   exportparts="label:locale-select-label,select:locale-select-select"
         * These ::part() rules are the only way to style it from the outer document.
         * (Issue #19506)
         */
        ak-flow-executor::part(locale-select) {
          color: #3bd6b0;
        }

        ak-flow-executor::part(locale-select-label) {
          color: #3bd6b0;
        }

        ak-flow-executor::part(locale-select-select) {
          color: #3bd6b0;
          border-color: #3bd6b0;
        }

        /* ── Shadow DOM element rules ───────────────────────────────────────────────── */
        input:focus,
        input:focus-visible,
        select:focus,
        select:focus-visible,
        textarea:focus,
        textarea:focus-visible {
          outline: 2px solid #3bd6b0 !important;
          outline-offset: 2px;
          box-shadow: none !important;
        }

        .pf-c-brand {
          background: #3bd6b0 !important;
          padding: 1.5rem 2rem;
        }

        /* Logo is white PNG — invert to dark for visibility on the teal banner */
        .pf-c-brand img {
          filter: brightness(0) !important;
        }

        ak-brand-links {
          visibility: hidden;
          height: 0;
          overflow: hidden;
          display: block;
        }

        /* ── i18n: Hide hardcoded flow titles globally ───────────────────────────── */
        /*
         * Flow titles (.pf-c-title) are hardcoded English — hide them on all stages.
         * On PromptStages, translated title-prompts (static type) replace them.
         * On other stages (Identification, Password), the form is self-explanatory.
         */
        .pf-c-title,
        .pf-v5-c-title {
          display: none !important;
        }

        /* Hide labels on PromptStages only (they are hardcoded English).
         * Other stages (Identification, Password) have natively-translated labels. */
        ak-stage-prompt .pf-c-form__label,
        ak-stage-prompt .pf-v5-c-form__label {
          display: none !important;
        }

        /* ── i18n: Style translated title prompts ──────────────────────────────────── */
        /*
         * Static prompts render as bare <p> tags directly inside .pf-c-form (not
         * wrapped in .pf-c-form__group).  Target them to look like headings,
         * replacing the hidden .pf-c-title above.
         *
         * NOTE: use descendant selector (space) NOT child combinator (>).
         * The > char is HTML-escaped by authentik's CSS injection pipeline,
         * turning "form > p" into "form u003e p" which never matches.
         */
        ak-stage-prompt .pf-c-form p,
        ak-stage-prompt .pf-v5-c-form p {
          font-family: inherit !important;
          font-size: 1.25rem !important;
          font-weight: 500 !important;
          text-align: left !important;
          margin: 0 0 1rem !important;
          padding: 0 !important;
          line-height: 1.3 !important;
          color: var(--pf-global--Color--100, #151515) !important;
        }
      branding_favicon: favicon.ico
      branding_logo: brand_logo.png
      branding_title: Avatar
      default: false
      default_application: !KeyOf 'avatar-api'
      domain: !Context 'domain'
      flow_authentication: !KeyOf 'avatar-authentication-flow'
      flow_device_code: null
      flow_invalidation: !Find [authentik_flows.flow, [slug, default-invalidation-flow]]
