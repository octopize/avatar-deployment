# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
---
# Octopize Avatar - Authentik Blueprint
# This blueprint configures SSO authentication for the Avatar API platform
# including custom flows, stages, policies, and email templates
#
# All deployment-specific values are resolved at apply time via !Env tags.
# The following environment variables must be set in the authentik deployment:
#   AVATAR_AUTHENTIK_BLUEPRINT_DOMAIN                - Base domain (e.g., avatar.yourcompany.com)
#   AVATAR_AUTHENTIK_BLUEPRINT_CLIENT_ID             - OAuth2 Client ID
#   AVATAR_AUTHENTIK_BLUEPRINT_CLIENT_SECRET         - OAuth2 Client Secret
#   AVATAR_AUTHENTIK_BLUEPRINT_API_REDIRECT_URI      - Full redirect URI for API
#   AVATAR_AUTHENTIK_BLUEPRINT_SELF_SERVICE_LICENSE   - License type for self-service signups

context:
  app_name: Avatar API
  domain: !Env 'AVATAR_AUTHENTIK_BLUEPRINT_DOMAIN'
  license_type: full
metadata:
  name: octopize-avatar-sso-configuration
version: 1
entries:

# ============================================================
# GROUPS
# ============================================================
  - attrs:
      attributes:
        license: !Context 'license_type'
        role: admin
      is_superuser: true
      name: Octopize - Admins
    id: octopize---admins
    identifiers:
      name: Octopize - Admins
    model: authentik_core.group
    state: present
  - attrs:
      attributes:
        license: !Context 'license_type'
      is_superuser: false
      name: Octopize - Users
    id: octopize---users
    identifiers:
      name: Octopize - Users
    model: authentik_core.group
    state: present

# ============================================================
# FLOWS
# ============================================================
  - attrs:
      authentication: none
      background: ''
      compatibility_mode: true
      denied_action: message_continue
      designation: enrollment
      layout: stacked
      name: avatar-self-service-signup-flow
      policy_engine_mode: any
      slug: avatar-self-service-signup-flow
      title: Self-service signup for Avatar
    id: avatar-self-service-signup-flow
    identifiers:
      slug: avatar-self-service-signup-flow
    model: authentik_flows.flow
    state: present
  - attrs:
      authentication: none
      background: ''
      compatibility_mode: true
      denied_action: message_continue
      designation: authentication
      layout: stacked
      name: avatar-authentication-flow
      policy_engine_mode: any
      slug: avatar-authentication-flow
      title: Avatar authentication
    id: avatar-authentication-flow
    identifiers:
      slug: avatar-authentication-flow
    model: authentik_flows.flow
    state: present
  - attrs:
      authentication: require_unauthenticated
      background: ''
      compatibility_mode: false
      denied_action: message_continue
      designation: recovery
      layout: stacked
      name: Avatar recovery flow
      policy_engine_mode: any
      slug: avatar-recovery-flow
      title: Reset your password
    id: avatar-recovery-flow
    identifiers:
      slug: avatar-recovery-flow
    model: authentik_flows.flow
    state: present

# ============================================================
# PROMPTS
# ============================================================

  # ── Translated input prompts ──────────────────────────────
  # Each prompt uses a get_translation() helper that reads
  # /templates/translations.json and selects the string matching
  # the user's current locale (LANGUAGE_CODE).

  - attrs:
      field_key: password
      initial_value: ''
      initial_value_expression: false
      label: '​'
      name: avatar-translated-input-field-password
      order: 100
      placeholder: |-
        import json, pathlib
        def get_translation(key, default=""):
            try:
                data = json.loads(pathlib.Path("/templates/translations.json").read_text())
                lang = request.http_request.LANGUAGE_CODE[:2]
                return data.get(lang, data.get("en", {})).get(key, default)
            except Exception:
                return default
        return get_translation("placeholder_password", "Password")
      placeholder_expression: true
      required: true
      sub_text: ''
      type: password
    id: avatar-translated-input-field-password
    identifiers:
      field_key: password
      name: avatar-translated-input-field-password
    model: authentik_stages_prompt.prompt
    state: present

  - attrs:
      field_key: password_repeat
      initial_value: ''
      initial_value_expression: false
      label: '​'
      name: avatar-translated-input-field-password-repeat
      order: 101
      placeholder: |-
        import json, pathlib
        def get_translation(key, default=""):
            try:
                data = json.loads(pathlib.Path("/templates/translations.json").read_text())
                lang = request.http_request.LANGUAGE_CODE[:2]
                return data.get(lang, data.get("en", {})).get(key, default)
            except Exception:
                return default
        return get_translation("placeholder_password_repeat", "Password (repeat)")
      placeholder_expression: true
      required: true
      sub_text: ''
      type: password
    id: avatar-translated-input-field-password-repeat
    identifiers:
      field_key: password_repeat
      name: avatar-translated-input-field-password-repeat
    model: authentik_stages_prompt.prompt
    state: present

  - attrs:
      field_key: username
      initial_value: ''
      initial_value_expression: false
      label: '​'
      name: avatar-translated-input-field-username
      order: 100
      placeholder: |-
        import json, pathlib
        def get_translation(key, default=""):
            try:
                data = json.loads(pathlib.Path("/templates/translations.json").read_text())
                lang = request.http_request.LANGUAGE_CODE[:2]
                return data.get(lang, data.get("en", {})).get(key, default)
            except Exception:
                return default
        return get_translation("placeholder_username", "Username")
      placeholder_expression: true
      required: true
      sub_text: ''
      type: text
    id: avatar-translated-input-field-username
    identifiers:
      field_key: username
      name: avatar-translated-input-field-username
    model: authentik_stages_prompt.prompt
    state: present

  - attrs:
      field_key: email
      initial_value: |-
        try:
            return request.context.get("prompt_data", {}).get("email", "")
        except Exception:
            return ""
      initial_value_expression: true
      label: '​'
      name: avatar-translated-input-field-email
      order: 101
      placeholder: |-
        import json, pathlib
        def get_translation(key, default=""):
            try:
                data = json.loads(pathlib.Path("/templates/translations.json").read_text())
                lang = request.http_request.LANGUAGE_CODE[:2]
                return data.get(lang, data.get("en", {})).get(key, default)
            except Exception:
                return default
        return get_translation("placeholder_email", "Email")
      placeholder_expression: true
      required: true
      sub_text: ''
      type: email
    id: avatar-translated-input-field-email
    identifiers:
      field_key: email
      name: avatar-translated-input-field-email
    model: authentik_stages_prompt.prompt
    state: present

  - attrs:
      field_key: migration_consent
      initial_value: |-
        import json, pathlib
        def get_translation(key, default=""):
            try:
                data = json.loads(pathlib.Path("/templates/translations.json").read_text())
                lang = request.http_request.LANGUAGE_CODE[:2]
                return data.get(lang, data.get("en", {})).get(key, default)
            except Exception:
                return default
        return get_translation("message_migration_consent", "Your account needs migration, we will proceed to a password reset. Click continue to validate.")
      initial_value_expression: true
      label: '​'
      name: avatar-translated-input-field-migration-consent
      order: 100
      placeholder: ''
      placeholder_expression: false
      required: true
      sub_text: ''
      type: static
    id: avatar-translated-input-field-migration-consent
    identifiers:
      field_key: migration_consent
      name: avatar-translated-input-field-migration-consent
    model: authentik_stages_prompt.prompt
    state: present

  # ── Title prompts (static, one per PromptStage) ───────────
  # These replace the hidden flow .pf-c-title with a translated
  # heading rendered inside the PromptStage itself.

  - attrs:
      field_key: title_signup
      initial_value: |-
        import json, pathlib
        def get_translation(key, default=""):
            try:
                data = json.loads(pathlib.Path("/templates/translations.json").read_text())
                lang = request.http_request.LANGUAGE_CODE[:2]
                return data.get(lang, data.get("en", {})).get(key, default)
            except Exception:
                return default
        return get_translation("title_signup", "Sign up for Avatar")
      initial_value_expression: true
      label: '​'
      name: avatar-title-signup-enrollment
      order: 0
      placeholder: ''
      placeholder_expression: false
      required: true
      sub_text: ''
      type: static
    id: avatar-title-signup-enrollment
    identifiers:
      field_key: title_signup
      name: avatar-title-signup-enrollment
    model: authentik_stages_prompt.prompt
    state: present

  - attrs:
      field_key: title_password_signup
      initial_value: |-
        import json, pathlib
        def get_translation(key, default=""):
            try:
                data = json.loads(pathlib.Path("/templates/translations.json").read_text())
                lang = request.http_request.LANGUAGE_CODE[:2]
                return data.get(lang, data.get("en", {})).get(key, default)
            except Exception:
                return default
        return get_translation("title_password_signup", "Choose a password")
      initial_value_expression: true
      label: '​'
      name: avatar-title-password-signup
      order: 0
      placeholder: ''
      placeholder_expression: false
      required: true
      sub_text: ''
      type: static
    id: avatar-title-password-signup
    identifiers:
      field_key: title_password_signup
      name: avatar-title-password-signup
    model: authentik_stages_prompt.prompt
    state: present

  - attrs:
      field_key: title_password_recovery
      initial_value: |-
        import json, pathlib
        def get_translation(key, default=""):
            try:
                data = json.loads(pathlib.Path("/templates/translations.json").read_text())
                lang = request.http_request.LANGUAGE_CODE[:2]
                return data.get(lang, data.get("en", {})).get(key, default)
            except Exception:
                return default
        return get_translation("title_password_recovery", "Reset your password")
      initial_value_expression: true
      label: '​'
      name: avatar-title-password-recovery
      order: 0
      placeholder: ''
      placeholder_expression: false
      required: true
      sub_text: ''
      type: static
    id: avatar-title-password-recovery
    identifiers:
      field_key: title_password_recovery
      name: avatar-title-password-recovery
    model: authentik_stages_prompt.prompt
    state: present

  - attrs:
      field_key: title_migration
      initial_value: |-
        import json, pathlib
        def get_translation(key, default=""):
            try:
                data = json.loads(pathlib.Path("/templates/translations.json").read_text())
                lang = request.http_request.LANGUAGE_CODE[:2]
                return data.get(lang, data.get("en", {})).get(key, default)
            except Exception:
                return default
        return get_translation("title_migration", "Account migration required")
      initial_value_expression: true
      label: '​'
      name: avatar-title-migration
      order: 0
      placeholder: ''
      placeholder_expression: false
      required: true
      sub_text: ''
      type: static
    id: avatar-title-migration
    identifiers:
      field_key: title_migration
      name: avatar-title-migration
    model: authentik_stages_prompt.prompt
    state: present

# ============================================================
# POLICIES
# ============================================================
  - attrs:
      execution_logging: false
      expression: |-
        if not request.user:
            return False

        must_reset_password = request.user.attributes.get('must_reset_password')

        return bool(must_reset_password)
      name: avatar-is-existing-non-migrated-account
    id: avatar-is-existing-non-migrated-account
    identifiers:
      name: avatar-is-existing-non-migrated-account
    model: authentik_policies_expression.expressionpolicy
    state: present
  - attrs:
      execution_logging: false
      expression: |-
        user = request.user
        if user and "must_reset_password" in user.attributes:
            del user.attributes["must_reset_password"]
            user.save()
        return True
      name: avatar-clear-must-reset-password-flag
    id: avatar-clear-must-reset-password-flag
    identifiers:
      name: avatar-clear-must-reset-password-flag
    model: authentik_policies_expression.expressionpolicy
    state: present
  - attrs:
      execution_logging: false
      expression: |-
        from authentik.core.models import User

        email = context.get("prompt_data", {}).get("email")
        user_exists = User.objects.filter(email__iexact=email).exists()

        # Store the result in the flow context for the next stages to use
        context["user_already_exists"] = user_exists

        # Always return True so the attacker doesn't get an error message
        return True
      name: check-email-exists-silently
    id: check-email-exists-silently
    identifiers:
      name: check-email-exists-silently
    model: authentik_policies_expression.expressionpolicy
    state: present
  - attrs:
      execution_logging: false
      expression: |-
        # Check if the 'user_already_exists' flag was set to False
        user_exists = context.get("user_already_exists", False)

        return user_exists
      name: policy-user-already-exists
    id: policy-user-already-exists
    identifiers:
      name: policy-user-already-exists
    model: authentik_policies_expression.expressionpolicy
    state: present
  - attrs:
      expression: !Format ["from authentik.core.models import Group\n\n# Get the email from the prompt data collected in the first stage\nemail = context.get(\"prompt_data\", {}).get(\"email\")\n\nif email:\n    # Get or create a group with the same suffix as the email\n    group, created = Group.objects.get_or_create(name=f\"self_service-{email}\")\n\n    # Update the attributes for the group\n    # We use a dictionary update to ensure we don't overwrite other existing attributes\n    if not group.attributes:\n        group.attributes = {}\n\n    group.attributes[\"license\"] = \"%s\"\n    group.save()\n\n    # Assign the group object to the flow context\n    # Authentik expects a list of Group objects in the ['groups'] key\n    context[\"flow_plan\"].context[\"groups\"] = [group]\n\n    if created:\n        ak_logger.info(f\"Created new personal group with demo license for user: {email}\")\n    else:\n        ak_logger.info(f\"Updated existing group attributes for user: {email}\")\n\nreturn True", !Env 'AVATAR_AUTHENTIK_BLUEPRINT_SELF_SERVICE_LICENSE']
      name: avatar-self-service-per-user-organization-creation
    id: avatar-self-service-per-user-organization-creation
    identifiers:
      name: avatar-self-service-per-user-organization-creation
    model: authentik_policies_expression.expressionpolicy
    state: present
  - attrs:
      execution_logging: false
      expression: |-
        # Auto-set username to email so users only need to provide an email address.
        # Authentik requires a username to create a user, but we hide the username
        # field from the signup form and derive it from the email instead.
        email = context.get("prompt_data", {}).get("email")
        if email:
            context["prompt_data"]["username"] = email
        return True
      name: avatar-set-username-from-email
    id: avatar-set-username-from-email
    identifiers:
      name: avatar-set-username-from-email
    model: authentik_policies_expression.expressionpolicy
    state: present
  - attrs:
      amount_digits: 0
      amount_lowercase: 0
      amount_symbols: 0
      amount_uppercase: 0
      check_have_i_been_pwned: false
      check_static_rules: true
      check_zxcvbn: false
      error_message: Password must be at least 12 characters long.
      execution_logging: false
      hibp_allowed_count: 0
      length_min: 12
      name: avatar-password-length-policy
      password_field: password
      symbol_charset: '!\"#$%&''()*+,-./:;<=>?@[]^_`{|}~'
      zxcvbn_score_threshold: 2
    id: avatar-password-length-policy
    identifiers:
      name: avatar-password-length-policy
    model: authentik_policies_password.passwordpolicy
    state: present

# ============================================================
# STAGES
# ============================================================
  - attrs:
      consent_expire_in: weeks=4
      mode: permanent
      name: avatar-should-migrate-account
    id: avatar-should-migrate-account
    identifiers:
      name: avatar-should-migrate-account
    model: authentik_stages_consent.consentstage
    state: present
  - attrs:
      activate_user_on_success: false
      from_address: system@authentik.local
      host: localhost
      name: avatar-email-someone-tried-to-register-with-your-mail
      port: 25
      recovery_cache_timeout: minutes=5
      recovery_max_attempts: 5
      subject: Someone tried to register with your mail
      template: email/email_account_exists.html
      timeout: 10
      token_expiry: minutes=0
      use_global_settings: true
      use_ssl: false
      use_tls: false
      username: ''
    id: avatar-email-someone-tried-to-register-with-your-mail
    identifiers:
      name: avatar-email-someone-tried-to-register-with-your-mail
    model: authentik_stages_email.emailstage
    state: present
  - attrs:
      activate_user_on_success: true
      from_address: system@authentik.local
      host: localhost
      name: avatar-email-account-confirmation
      port: 25
      recovery_cache_timeout: minutes=5
      recovery_max_attempts: 5
      subject: Avatar - Account confirmation
      template: email/email_account_confirmation.html
      timeout: 10
      token_expiry: hours=24
      use_global_settings: true
      use_ssl: false
      use_tls: false
      username: ''
    id: avatar-email-account-confirmation
    identifiers:
      name: avatar-email-account-confirmation
    model: authentik_stages_email.emailstage
    state: present
  - attrs:
      activate_user_on_success: true
      from_address: system@authentik.local
      host: localhost
      name: avatar-recovery-email
      port: 25
      recovery_cache_timeout: minutes=5
      recovery_max_attempts: 5
      subject: Avatar - Reset password
      template: email/email_password_reset.html
      timeout: 10
      token_expiry: minutes=30
      use_global_settings: true
      use_ssl: false
      use_tls: false
      username: ''
    id: avatar-recovery-email
    identifiers:
      name: avatar-recovery-email
    model: authentik_stages_email.emailstage
    state: present
  - attrs:
      captcha_stage: null
      case_insensitive_matching: true
      enable_remember_me: false
      enrollment_flow: null
      name: default-recovery-identification
      password_stage: null
      passwordless_flow: null
      pretend_user_exists: true
      recovery_flow: null
      show_matched_user: true
      show_source_labels: false
      user_fields:
      - email
      webauthn_stage: null
    id: default-recovery-identification
    identifiers:
      name: default-recovery-identification
    model: authentik_stages_identification.identificationstage
    state: present
  - attrs:
      captcha_stage: null
      case_insensitive_matching: true
      enable_remember_me: false
      enrollment_flow: !KeyOf 'avatar-self-service-signup-flow'
      name: avatar-authentication-stage
      password_stage: null
      passwordless_flow: null
      pretend_user_exists: true
      recovery_flow: !KeyOf 'avatar-recovery-flow'
      show_matched_user: true
      show_source_labels: false
      user_fields:
      - email
      webauthn_stage: null
    id: avatar-authentication-stage
    identifiers:
      name: avatar-authentication-stage
    model: authentik_stages_identification.identificationstage
    state: present
  - attrs:
      allow_show_password: true
      backends:
      - authentik.core.auth.InbuiltBackend
      - authentik.core.auth.TokenBackend
      - authentik.sources.ldap.auth.LDAPBackend
      - authentik.sources.kerberos.auth.KerberosBackend
      configure_flow: !Find [authentik_flows.flow, [slug, default-password-change]]
      failed_attempts_before_cancel: 5
      name: avatar-password-stage
    id: avatar-password-stage
    identifiers:
      name: avatar-password-stage
    model: authentik_stages_password.passwordstage
    state: present
  - attrs:
      fields:
      - !KeyOf 'avatar-title-signup-enrollment'
      - !KeyOf 'avatar-translated-input-field-email'
      name: avatar-source-enrollment-prompt
    id: avatar-source-enrollment-prompt
    identifiers:
      name: avatar-source-enrollment-prompt
    model: authentik_stages_prompt.promptstage
    state: present
  - attrs:
      fields:
      - !KeyOf 'avatar-title-password-signup'
      - !KeyOf 'avatar-translated-input-field-password'
      - !KeyOf 'avatar-translated-input-field-password-repeat'
      name: avatar-signup-password-stage
      validation_policies:
      - !KeyOf 'avatar-password-length-policy'
    id: avatar-signup-password-stage
    identifiers:
      name: avatar-signup-password-stage
    model: authentik_stages_prompt.promptstage
    state: present
  - attrs:
      fields:
      - !KeyOf 'avatar-title-password-recovery'
      - !KeyOf 'avatar-translated-input-field-password'
      - !KeyOf 'avatar-translated-input-field-password-repeat'
      name: avatar-recovery-password-stage
      validation_policies:
      - !KeyOf 'avatar-password-length-policy'
    id: avatar-recovery-password-stage
    identifiers:
      name: avatar-recovery-password-stage
    model: authentik_stages_prompt.promptstage
    state: present
  - attrs:
      fields:
      - !KeyOf 'avatar-title-migration'
      - !KeyOf 'avatar-translated-input-field-migration-consent'
      name: avatar-migration-stage
    id: avatar-migration-stage
    identifiers:
      name: avatar-migration-stage
    model: authentik_stages_prompt.promptstage
    state: present
  - attrs:
      keep_context: false
      mode: flow
      name: avatar-redirect-to-recovery-flow
      target_flow: !KeyOf 'avatar-recovery-flow'
      target_static: ''
    id: avatar-redirect-to-recovery-flow
    identifiers:
      name: avatar-redirect-to-recovery-flow
    model: authentik_stages_redirect.redirectstage
    state: present
  - attrs:
      geoip_binding: no_binding
      name: default-recovery-user-login
      network_binding: no_binding
      remember_device: days=30
      remember_me_offset: seconds=0
      session_duration: seconds=0
      terminate_other_sessions: false
    id: default-recovery-user-login
    identifiers:
      name: default-recovery-user-login
    model: authentik_stages_user_login.userloginstage
    state: present
  - attrs:
      geoip_binding: bind_continent
      name: avatar-recovery-user-login
      network_binding: bind_asn
      remember_device: days=30
      remember_me_offset: seconds=0
      session_duration: seconds=0
      terminate_other_sessions: false
    id: avatar-recovery-user-login
    identifiers:
      name: avatar-recovery-user-login
    model: authentik_stages_user_login.userloginstage
    state: present
  - attrs:
      create_users_as_inactive: true
      create_users_group: null
      name: avatar-self-service-user-identity-write
      user_creation_mode: always_create
      user_path_template: users/self-service
      user_type: external
    id: avatar-self-service-user-identity-write
    identifiers:
      name: avatar-self-service-user-identity-write
    model: authentik_stages_user_write.userwritestage
    state: present
  - attrs:
      create_users_as_inactive: true
      create_users_group: null
      name: avatar-self-service-user-password-write
      user_creation_mode: never_create
      user_path_template: users/self-service
      user_type: external
    id: avatar-self-service-user-password-write
    identifiers:
      name: avatar-self-service-user-password-write
    model: authentik_stages_user_write.userwritestage
    state: present
  - attrs:
      create_users_as_inactive: false
      create_users_group: null
      name: default-recovery-user-write
      user_creation_mode: never_create
      user_path_template: ''
      user_type: external
    id: default-recovery-user-write
    identifiers:
      name: default-recovery-user-write
    model: authentik_stages_user_write.userwritestage
    state: present

# ============================================================
# FLOW STAGE BINDINGS
# ============================================================

  # ========================================
  # FLOW STAGE BINDINGS - Authentication Flow
  # ========================================
  - attrs:
      evaluate_on_plan: false
      invalid_response_action: retry
      order: 10
      policy_engine_mode: any
      re_evaluate_policies: true
      stage: !KeyOf 'avatar-authentication-stage'
